<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輔大企管交換學生版圖 - 完整互動最終版</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
/* ── 基礎全域設定 ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
  background: #F0F4F8;
  height: 100vh; width: 100vw;
  overflow: hidden; 
  display: flex; justify-content: center; align-items: center;
}

#poster-wrapper {
  width: 1080px; height: 1920px;
  background: #FFFFFF;
  position: relative;
  overflow: hidden;
  transform-origin: center center;
  box-shadow: 0 0 100px rgba(0,0,0,0.2);
}

/* ── 頁面切換動畫 ── */
.page {
  position: absolute; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  transition: opacity 0.5s ease, transform 0.5s ease;
  background: white;
}
.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

/* ──【頁面 1：互動首頁】── */
.hero-header {
  background: linear-gradient(135deg, #6C5CE7 0%, #a29bfe 45%, #fd79a8 100%);
  padding: 50px 40px 40px; text-align: center; color: white;
}
.logo-badge {
  width: 100px; height: 100px; border-radius: 30px;
  background: rgba(255, 255, 255, 0.3); border: 3px solid #FFF;
  display: flex; align-items: center; justify-content: center;
  font-size: 55px; color: white; margin: 0 auto 25px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

.main-title {
  font-size: 82px; font-weight: 900; color: white; 
  letter-spacing: 4px; white-space: nowrap; margin-bottom: 15px;
  text-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.subtitle { font-size: 32px; color: rgba(255, 255, 255, 0.9); letter-spacing: 8px; font-weight: 700; }

.hero-map-visual { height: 420px; position: relative; display: flex; align-items: center; justify-content: center; }
#hero-map-svg { width: 100%; height: 100%; }

.hero-stats {
  display: flex; justify-content: space-around; padding: 50px 40px;
  background: rgba(255, 255, 255, 0.8); border-top: 2px solid rgba(80, 80, 180, 0.05);
}
.hero-stat-num { font-size: 110px; font-weight: 900; color: #6C5CE7; line-height: 1; margin-bottom: 15px; }
.hero-stat-label { font-size: 34px; color: #2D3436; font-weight: 700; }

.cta-area {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  text-align: center; background: white; padding-bottom: 150px;
}
.explore-btn {
  background: linear-gradient(135deg, #6C5CE7 0%, #FD79A8 100%);
  color: white; font-size: 52px; font-weight: 900; padding: 50px 140px; border-radius: 100px;
  box-shadow: 0 15px 40px rgba(108, 92, 231, 0.3);
  animation: pulse 2s infinite; border: none; cursor: pointer; letter-spacing: 4px;
}
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

/* ──【頁面 2：國家名單頁】── */
.list-header {
  background: #2C3E50; padding: 40px 60px;
  display: flex; justify-content: space-between; align-items: center; color: white;
}
.back-btn {
  font-size: 30px; font-weight: 800; color: white; background: rgba(255,255,255,0.1);
  padding: 15px 35px; border-radius: 50px; cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
}
.list-map-mini { height: 350px; background: #F8F9FF; position: relative; }
.list-stats-compact {
  display: flex; justify-content: space-around; padding: 30px;
  background: #6C5CE7; color: white;
}
.country-list-container {
  flex: 1; overflow-y: auto; padding: 40px 60px;
  display: flex; flex-direction: column; gap: 30px; background: #F4F7FF;
}
/* 國家按鈕 - 放大版 */
.country-btn {
  background: white; border-radius: 35px; padding: 40px 50px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 12px 35px rgba(80,80,180,0.1); border: 1px solid #E0E0E0;
  cursor: pointer;
}
.country-btn:active { background: #F0F0F0; transform: scale(0.98); }
.country-info { display: flex; align-items: center; gap: 45px; }

/* 國旗放大至 100px */
.country-flag { font-size: 100px; line-height: 1; }

.country-name-zh { font-size: 52px; font-weight: 900; color: #2D3436; }
.country-name-en { font-size: 26px; color: #BBB; font-weight: 700; text-transform: uppercase; }

/* 人數標籤放大 */
.country-count {
  background: #6C5CE7; color: white;
  padding: 18px 45px; border-radius: 60px;
  font-size: 42px; font-weight: 800;
  box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
}

/* ── 彈出視窗 ── */
#modal-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center;
  z-index: 10000; backdrop-filter: blur(15px);
}
.modal-content {
  width: 950px; height: 1550px; background: white; border-radius: 60px;
  display: flex; flex-direction: column; overflow: hidden;
  animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-header { padding: 60px; color: white; text-align: center; position: relative; flex-shrink: 0; }
.close-btn { position: absolute; top: 40px; right: 50px; font-size: 80px; color: white; cursor: pointer; }
.student-grid { flex: 1; overflow-y: auto; padding: 40px 60px 80px; display: flex; flex-direction: column; gap: 30px; }
.student-card { background: #F8F9FA; padding: 35px; border-radius: 25px; border: 1px solid #EEE; }
.st-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.st-name { font-size: 46px; font-weight: 900; color: #2D3436; }
.st-year { font-size: 26px; font-weight: 800; padding: 6px 20px; border-radius: 10px; }
.st-sch { font-size: 32px; color: #555; font-weight: 700; border-left: 8px solid #6C5CE7; padding-left: 22px; line-height: 1.4; }

.footer { padding: 40px; text-align: center; font-size: 24px; font-weight: 800; color: #636E72; }
</style>
</head>
<body>

<div id="poster-wrapper">
  
  <div id="hero-page" class="page">
    <div class="hero-header">
      <div class="logo-badge">✝</div>
      <h1 class="main-title">輔大企管交換學生版圖</h1>
      <p class="subtitle">FJCU BUSINESS ADMINISTRATION</p>
    </div>
    <div class="hero-map-visual">
      <svg id="hero-map-svg"></svg>
    </div>
    <div class="hero-stats">
      <div class="stat-box"><div class="hero-stat-num">11</div><div class="hero-stat-label">國家地區</div></div>
      <div class="stat-box"><div class="hero-stat-num">33</div><div class="hero-stat-label">合作院校</div></div>
      <div class="stat-box"><div class="hero-stat-num">47</div><div class="hero-stat-label">交換學子</div></div>
    </div>
    <div class="cta-area">
      <div>
        <button class="explore-btn" onclick="showListPage()">按此探索全球據點</button>
        <p style="margin-top:40px; font-size:28px; color:#ABB8C3; font-weight:700;">點擊螢幕開始體驗互動版圖</p>
      </div>
    </div>
  </div>

  <div id="list-page" class="page hidden">
    <div class="list-header">
      <div style="font-size: 42px; font-weight: 900;">🌍 據點探索</div>
      <div class="back-btn" onclick="showHeroPage()">🏠 返回首頁</div>
    </div>
    <div class="list-map-mini">
      <svg id="list-map-svg" style="width:100%; height:100%;"></svg>
    </div>
    <div class="list-stats-compact">
      <div style="text-align:center;"><div style="font-size:52px; font-weight:900;">11</div><div style="font-size:22px; opacity:0.8;">國家地區</div></div>
      <div style="text-align:center;"><div style="font-size:52px; font-weight:900;">33</div><div style="font-size:22px; opacity:0.8;">合作院校</div></div>
      <div style="text-align:center;"><div style="font-size:52px; font-weight:900;">47</div><div style="font-size:22px; opacity:0.8;">交換學生</div></div>
    </div>
    <div class="country-list-container" id="country-list">
      </div>
    <div class="footer">🌐 國際視野 | 📚 跨域學習 | 🤝 文化交流 | 🏆 全球競爭力</div>
  </div>

  <div id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header" id="modal-header">
        <div class="close-btn" onclick="closeModal()">×</div>
        <div id="modal-title-zh" style="font-size: 64px; font-weight: 900;"></div>
        <div id="modal-title-en" style="font-size: 28px; opacity: 0.8; margin-top: 12px;"></div>
      </div>
      <div class="student-grid" id="student-container"></div>
    </div>
  </div>

</div>

<script>
const countries = [
  { id:'250', name:'法國', en:'France', flag:'🇫🇷', center:[2.3, 47], color:'#6C5CE7',
    students:[
      {n:'田芷翎', s:'112-1', sch:'諾曼第管理學院'}, {n:'洪巧蓁', s:'112-2', sch:'KEDGE高等商業學院'},
      {n:'羅芝盈', s:'112-2', sch:'里昂天主教大學'}, {n:'林心瑜', s:'112-2', sch:'里昂天主教大學'},
      {n:'傅子珊', s:'112-2', sch:'諾曼第管理學院'}, {n:'馬恩博', s:'112-2', sch:'諾曼第管理學院'},
      {n:'黃若茵', s:'113-1', sch:'亞塞格管理學院'}, {n:'殷品筑', s:'113-2', sch:'KEDGE高等商業學院'},
      {n:'劉又瑄', s:'113-2', sch:'翁傑高等商學院'}, {n:'邱慧欣', s:'113-2', sch:'KEDGE高等商業學院'},
      {n:'陳彥蓁', s:'114-2', sch:'天主教里爾大學'}, {n:'林怡辰', s:'114-2', sch:'翁傑高等商學院'}
    ]},
  { id:'156', name:'中國', en:'China', flag:'🇨🇳', center:[104, 35], color:'#00CEC9',
    students:[
      {n:'楊雅珽', s:'112-2', sch:'中國人民大學'}, {n:'翁寧', s:'112-2', sch:'西南財經大學'},
      {n:'林怡萱', s:'112-2', sch:'復旦大學'}, {n:'李曉芸', s:'113-2', sch:'復旦大學'},
      {n:'蔣博安', s:'113-2', sch:'武漢大學'}, {n:'林郁心', s:'113-2', sch:'清華大學'}
    ]},
  { id:'410', name:'韓國', en:'Korea', flag:'🇰🇷', center:[127, 36], color:'#00CEC9',
    students:[
      {n:'劉雅婷', s:'112-2', sch:'首爾市立大學'}, {n:'李明曜', s:'112-2', sch:'誠信女子大學'},
      {n:'許愛翎', s:'113-2', sch:'天主教大學'}, {n:'蔡佩蓁', s:'113-2', sch:'崇實大學'},
      {n:'潘玟穎', s:'113-2', sch:'漢陽大學'}, {n:'蘇榆真', s:'113-2', sch:'成均館大學'},
      {n:'葉珉秀', s:'113-2', sch:'天主教大學'}, {n:'鄭以安', s:'114-1', sch:'仁川大學'},
      {n:'蔡安妍', s:'114-2', sch:'崇實大學'}
    ]},
  { id:'392', name:'日本', en:'Japan', flag:'🇯🇵', center:[138, 36], color:'#00CEC9',
    students:[
      {n:'廖榮強', s:'112-2', sch:'同志社大學'}, {n:'洪菉攸', s:'112-2', sch:'東洋大學'},
      {n:'羅羽媗', s:'113-1', sch:'東洋大學'}, {n:'陳柏勳', s:'113-2', sch:'西南學院大學'},
      {n:'徐楷', s:'113-2', sch:'西南學院大學'}, {n:'林艾妮', s:'114-2', sch:'大阪商業大學'}
    ]},
  { id:'528', name:'荷蘭', en:'Netherlands', flag:'🇳🇱', center:[5.3, 52.3], color:'#6C5CE7',
    students:[
      {n:'梅雨青', s:'112-2', sch:'方堤斯應用科技大學'}, {n:'謝詠淇', s:'112-2', sch:'格羅寧根大學'},
      {n:'張庭瑄', s:'114-2', sch:'格羅寧根大學'}
    ]},
  { id:'276', name:'德國', en:'Germany', flag:'🇩🇪', center:[10.4, 51], color:'#6C5CE7',
    students:[{n:'卜慧綸', s:'112-2', sch:'飛利浦馬堡大學'}, {n:'談家吟', s:'112-2', sch:'雷根斯堡大學'}]},
  { id:'203', name:'捷克', en:'Czech', flag:'🇨🇿', center:[15.4, 49.8], color:'#6C5CE7',
    students:[{n:'呂孟宸', s:'112-2', sch:'茲林湯馬士巴塔大學'}, {n:'盧宣瑜', s:'114-1', sch:'茲林湯馬士巴塔大學'}, {n:'徐子翊', s:'114-2', sch:'茲林湯馬士巴塔大學'}]},
  { id:'40',  name:'奧地利', en:'Austria', flag:'🇦🇹', center:[14.5, 47.5], color:'#6C5CE7',
    students:[{n:'李承澤', s:'113-2', sch:'薩爾斯堡大學'}, {n:'林孟霓', s:'114-1', sch:'上奧科技大學'}]},
  { id:'380', name:'義大利', en:'Italy', flag:'🇮🇹', center:[12.5, 41.8], color:'#6C5CE7',
    students:[{n:'吳育端', s:'113-1', sch:'羅馬國際研究大學'}]},
  { id:'840', name:'美國', en:'USA', flag:'🇺🇸', center:[-95, 37], color:'#FF7675',
    students:[{n:'蔡奇浩', s:'112-2', sch:'聖道大學'}, {n:'林晏甄', s:'113-2', sch:'匹茲堡州立大學'}]},
  { id:'056', name:'比利時', en:'Belgium', flag:'🇧🇪', center:[4.4, 50.5], color:'#6C5CE7',
    students:[{n:'郭旻佳', s:'114-1', sch:'那慕爾大學'}]},
];

function showListPage() {
  document.getElementById('hero-page').classList.add('hidden');
  document.getElementById('list-page').classList.remove('hidden');
}
function showHeroPage() {
  document.getElementById('list-page').classList.add('hidden');
  document.getElementById('hero-page').classList.remove('hidden');
}

function openModal(c) {
  document.getElementById('modal-header').style.background = c.color;
  document.getElementById('modal-title-zh').innerText = c.flag + " " + c.name;
  document.getElementById('modal-title-en').innerText = c.en;
  const container = document.getElementById('student-container');
  container.innerHTML = ''; container.scrollTop = 0;
  c.students.forEach(s => {
    const card = document.createElement('div');
    card.className = 'student-card';
    const badgeColor = s.s.startsWith('112') ? '#FDEBD0' : s.s.startsWith('113') ? '#EDE0FF' : '#D5F5E3';
    const textColor = s.s.startsWith('112') ? '#B7770D' : s.s.startsWith('113') ? '#5B2C8D' : '#1A7A3F';
    card.innerHTML = `<div class="st-top"><div class="st-name">${s.n}</div><div class="st-year" style="background:${badgeColor}; color:${textColor}">${s.s}</div></div><div class="st-sch">${s.sch}</div>`;
    container.appendChild(card);
  });
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

// ── 初始化 ──
window.onload = () => {
  const listEl = document.getElementById('country-list');
  countries.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'country-btn';
    btn.onclick = () => openModal(c);
    btn.innerHTML = `<div class="country-info"><div class="country-flag">${c.flag}</div><div><div class="country-name-zh">${c.name}</div><div class="country-name-en">${c.en}</div></div></div><div class="country-count">${c.students.length} 位</div>`;
    listEl.appendChild(btn);
  });
  
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
    // 關鍵修正：排除南極洲 (ID 010)
    const allFeats = topojson.feature(world, world.objects.countries);
    const filteredFeats = allFeats.features.filter(d => d.id !== '010');
    
    const highlightSet = new Set(countries.map(c=>c.id));
    
    // 首頁地圖
    const heroSvg = d3.select('#hero-map-svg');
    const heroProj = d3.geoNaturalEarth1().scale(150).translate([540, 210]);
    heroSvg.append('g').selectAll('path').data(filteredFeats).join('path').attr('d', d3.geoPath(heroProj)).attr('fill', '#DCDCDC').attr('stroke', '#FFF');
    countries.forEach(c => {
      const [dx, dy] = heroProj(c.center);
      heroSvg.append('circle').attr('cx', dx).attr('cy', dy).attr('r', 8).attr('fill', '#6C5CE7').attr('stroke', 'white').attr('stroke-width', 2);
    });

    // 名單頁地圖
    const listSvg = d3.select('#list-map-svg');
    const listProj = d3.geoNaturalEarth1().scale(140).translate([540, 180]);
    listSvg.append('g').selectAll('path').data(filteredFeats).join('path').attr('d', d3.geoPath(listProj)).attr('fill', '#EEE').attr('stroke', '#FFF');
    countries.forEach(c => {
      const [dx, dy] = listProj(c.center);
      listSvg.append('circle').attr('cx', dx).attr('cy', dy).attr('r', 6).attr('fill', '#6C5CE7').attr('stroke', 'white').attr('stroke-width', 1);
    });
  });
  
  autoScale();
};

function autoScale() {
  const wrapper = document.getElementById('poster-wrapper');
  const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
  wrapper.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', autoScale);
</script>
</body>
</html>
