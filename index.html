<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>輔大企管交換學生版圖 - 手機版</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
/* ── 基礎全域設定 ── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Nunito', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
  background: #F0F4F8;
  height: 100vh; width: 100vw;
  overflow: hidden; 
}

#app-container {
  max-width: 500px; /* 模擬手機寬度上限，避免平板上太散 */
  height: 100vh;
  margin: 0 auto;
  background: white;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* ── 頁面切換動畫 ── */
.page {
  position: absolute; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  transition: opacity 0.4s ease, transform 0.4s ease;
  background: white;
}
.hidden { opacity: 0; pointer-events: none; transform: translateX(20px); }

/* ──【頁面 1：手機首頁】── */
.hero-header {
  background: linear-gradient(135deg, #6C5CE7 0%, #a29bfe 45%, #fd79a8 100%);
  padding: 40px 20px 30px; text-align: center; color: white;
}
.logo-badge {
  width: 60px; height: 60px; border-radius: 18px;
  background: rgba(255, 255, 255, 0.3); border: 2px solid #FFF;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; color: white; margin: 0 auto 15px;
}
.main-title {
  font-size: 28px; font-weight: 900; color: white; 
  letter-spacing: 2px; white-space: nowrap; margin-bottom: 8px;
}
.subtitle { font-size: 14px; color: rgba(255, 255, 255, 0.9); letter-spacing: 3px; font-weight: 700; }

.hero-map-visual { flex: 1; min-height: 250px; position: relative; display: flex; align-items: center; justify-content: center; background: #FFF; }
#hero-map-svg { width: 100%; height: 100%; }

.hero-stats {
  display: flex; justify-content: space-around; padding: 25px 15px;
  background: #2C3E50; color: white;
}
.hero-stat-num { font-size: 36px; font-weight: 900; color: #74B9FF; line-height: 1; margin-bottom: 5px; }
.hero-stat-label { font-size: 12px; opacity: 0.8; font-weight: 700; }

.cta-area {
  padding: 40px 20px 60px; text-align: center; background: white;
}
.explore-btn {
  background: linear-gradient(135deg, #6C5CE7 0%, #FD79A8 100%);
  color: white; font-size: 20px; font-weight: 900; padding: 18px 50px; border-radius: 50px;
  box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
  border: none; cursor: pointer; letter-spacing: 2px; width: 100%;
}

/* ──【頁面 2：手機名單頁】── */
.list-header {
  background: #2C3E50; padding: 15px 20px;
  display: flex; justify-content: space-between; align-items: center; color: white;
}
.back-btn {
  font-size: 14px; font-weight: 800; color: white; background: rgba(255,255,255,0.1);
  padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
}
.list-map-mini { height: 150px; background: #F8F9FF; position: relative; }
.country-list-container {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 15px; background: #F4F7FF;
}
.country-btn {
  background: white; border-radius: 15px; padding: 15px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #EEE;
}
.country-info { display: flex; align-items: center; gap: 15px; }
.country-flag { font-size: 32px; }
.country-name-zh { font-size: 18px; font-weight: 900; color: #2D3436; }
.country-name-en { font-size: 12px; color: #BBB; font-weight: 700; text-transform: uppercase; }
.country-count {
  background: #6C5CE7; color: white;
  padding: 5px 12px; border-radius: 20px;
  font-size: 14px; font-weight: 800;
}

/* ── 手機版 Modal ── */
#modal-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: flex-end;
  z-index: 10000; backdrop-filter: blur(8px);
}
.modal-content {
  width: 100%; height: 85%; background: white; border-radius: 30px 30px 0 0;
  display: flex; flex-direction: column; overflow: hidden;
  animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { padding: 30px 20px; color: white; text-align: center; position: relative; }
.close-btn { position: absolute; top: 15px; right: 20px; font-size: 32px; color: white; }
.student-grid { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
.student-card { background: #F8F9FA; padding: 15px; border-radius: 12px; border: 1px solid #EEE; }
.st-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.st-name { font-size: 18px; font-weight: 900; color: #2D3436; }
.st-year { font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 6px; }
.st-sch { font-size: 14px; color: #555; font-weight: 700; border-left: 4px solid #6C5CE7; padding-left: 10px; margin-top: 5px; }

.footer { padding: 15px; text-align: center; font-size: 11px; font-weight: 800; color: #999; background: white; }
</style>
</head>
<body>

<div id="app-container">
  
  <div id="hero-page" class="page">
    <div class="hero-header">
      <div class="logo-badge">✝</div>
      <h1 class="main-title">輔大企管交換學生版圖</h1>
      <p class="subtitle">FJCU BUSINESS ADMINISTRATION</p>
    </div>
    <div class="hero-map-visual">
      <svg id="hero-map-svg"></svg>
    </div>
    <div class="hero-stats">
      <div class="stat-box"><div class="hero-stat-num">11</div><div class="hero-stat-label">國家地區</div></div>
      <div class="stat-box"><div class="hero-stat-num">33</div><div class="hero-stat-label">合作院校</div></div>
      <div class="stat-box"><div class="hero-stat-num">47</div><div class="hero-stat-label">交換學子</div></div>
    </div>
    <div class="cta-area">
      <button class="explore-btn" onclick="showListPage()">點此探索全球據點</button>
    </div>
  </div>

  <div id="list-page" class="page hidden">
    <div class="list-header">
      <div style="font-size: 18px; font-weight: 900;">🌍 據點探索</div>
      <div class="back-btn" onclick="showHeroPage()">🏠 返回</div>
    </div>
    <div class="list-map-mini">
      <svg id="list-map-svg" style="width:100%; height:100%;"></svg>
    </div>
    <div class="country-list-container" id="country-list">
      </div>
    <div class="footer">🌐 國際視野 | 📚 跨域學習 | 🤝 文化交流</div>
  </div>

  <div id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header" id="modal-header">
        <div class="close-btn" onclick="closeModal()">×</div>
        <div id="modal-title-zh" style="font-size: 24px; font-weight: 900;"></div>
        <div id="modal-title-en" style="font-size: 13px; opacity: 0.8; margin-top: 5px;"></div>
      </div>
      <div class="student-grid" id="student-container"></div>
    </div>
  </div>

</div>

<script>
const countries = [
  { id:'250', name:'法國', en:'France', flag:'🇫🇷', center:[2.3, 47], color:'#6C5CE7',
    students:[
      {n:'田芷翎', s:'112-1', sch:'諾曼第管理學院'}, {n:'洪巧蓁', s:'112-2', sch:'KEDGE高等商業學院'},
      {n:'羅芝盈', s:'112-2', sch:'里昂天主教大學'}, {n:'林心瑜', s:'112-2', sch:'里昂天主教大學'},
      {n:'傅子珊', s:'112-2', sch:'諾曼第管理學院'}, {n:'馬恩博', s:'112-2', sch:'諾曼第管理學院'},
      {n:'黃若茵', s:'113-1', sch:'亞塞格管理學院'}, {n:'殷品筑', s:'113-2', sch:'KEDGE高等商業學院'},
      {n:'劉又瑄', s:'113-2', sch:'翁傑高等商學院'}, {n:'邱慧欣', s:'113-2', sch:'KEDGE高等商業學院'},
      {n:'陳彥蓁', s:'114-2', sch:'天主教里爾大學'}, {n:'林怡辰', s:'114-2', sch:'翁傑高等商學院'}
    ]},
  { id:'156', name:'中國', en:'China', flag:'🇨🇳', center:[104, 35], color:'#00CEC9',
    students:[
      {n:'楊雅珽', s:'112-2', sch:'中國人民大學'}, {n:'翁寧', s:'112-2', sch:'西南財經大學'},
      {n:'林怡萱', s:'112-2', sch:'復旦大學'}, {n:'李曉芸', s:'113-2', sch:'復旦大學'},
      {n:'蔣博安', s:'113-2', sch:'武漢大學'}, {n:'林郁心', s:'113-2', sch:'清華大學'}
    ]},
  { id:'410', name:'韓國', en:'Korea', flag:'🇰🇷', center:[127, 36], color:'#00CEC9',
    students:[
      {n:'劉雅婷', s:'112-2', sch:'首爾市立大學'}, {n:'李明曜', s:'112-2', sch:'誠信女子大學'},
      {n:'許愛翎', s:'113-2', sch:'天主教大學'}, {n:'蔡佩蓁', s:'113-2', sch:'崇實大學'},
      {n:'潘玟穎', s:'113-2', sch:'漢陽大學'}, {n:'蘇榆真', s:'113-2', sch:'成均館大學'},
      {n:'葉珉秀', s:'113-2', sch:'天主教大學'}, {n:'鄭以安', s:'114-1', sch:'仁川大學'},
      {n:'蔡安妍', s:'114-2', sch:'崇實大學'}
    ]},
  { id:'392', name:'日本', en:'Japan', flag:'🇯🇵', center:[138, 36], color:'#00CEC9',
    students:[
      {n:'廖榮強', s:'112-2', sch:'同志社大學'}, {n:'洪菉攸', s:'112-2', sch:'東洋大學'},
      {n:'羅羽媗', s:'113-1', sch:'東洋大學'}, {n:'陳柏勳', s:'113-2', sch:'西南學院大學'},
      {n:'徐楷', s:'113-2', sch:'西南學院大學'}, {n:'林艾妮', s:'114-2', sch:'大阪商業大學'}
    ]},
  { id:'528', name:'荷蘭', en:'Netherlands', flag:'🇳🇱', center:[5.3, 52.3], color:'#6C5CE7',
    students:[
      {n:'梅雨青', s:'112-2', sch:'方堤斯應用科技大學'}, {n:'謝詠淇', s:'112-2', sch:'格羅寧根大學'},
      {n:'張庭瑄', s:'114-2', sch:'格羅寧根大學'}
    ]},
  { id:'276', name:'德國', en:'Germany', flag:'🇩🇪', center:[10.4, 51], color:'#6C5CE7',
    students:[{n:'卜慧綸', s:'112-2', sch:'飛利浦馬堡大學'}, {n:'談家吟', s:'112-2', sch:'雷根斯堡大學'}]},
  { id:'203', name:'捷克', en:'Czech', flag:'🇨🇿', center:[15.4, 49.8], color:'#6C5CE7',
    students:[{n:'呂孟宸', s:'112-2', sch:'茲林湯馬士巴塔大學'}, {n:'盧宣瑜', s:'114-1', sch:'茲林湯馬士巴塔大學'}, {n:'徐子翊', s:'114-2', sch:'茲林湯馬士巴塔大學'}]},
  { id:'40',  name:'奧地利', en:'Austria', flag:'🇦🇹', center:[14.5, 47.5], color:'#6C5CE7',
    students:[{n:'李承澤', s:'113-2', sch:'薩爾斯堡大學'}, {n:'林孟霓', s:'114-1', sch:'上奧科技大學'}]},
  { id:'380', name:'義大利', en:'Italy', flag:'🇮🇹', center:[12.5, 41.8], color:'#6C5CE7',
    students:[{n:'吳育端', s:'113-1', sch:'羅馬國際研究大學'}]},
  { id:'840', name:'美國', en:'USA', flag:'🇺🇸', center:[-95, 37], color:'#FF7675',
    students:[{n:'蔡奇浩', s:'112-2', sch:'聖道大學'}, {n:'林晏甄', s:'113-2', sch:'匹茲堡州立大學'}]},
  { id:'056', name:'比利時', en:'Belgium', flag:'🇧🇪', center:[4.4, 50.5], color:'#6C5CE7',
    students:[{n:'郭旻佳', s:'114-1', sch:'那慕爾大學'}]},
];

function showListPage() {
  document.getElementById('hero-page').classList.add('hidden');
  document.getElementById('list-page').classList.remove('hidden');
}
function showHeroPage() {
  document.getElementById('list-page').classList.add('hidden');
  document.getElementById('hero-page').classList.remove('hidden');
}

function openModal(c) {
  document.getElementById('modal-header').style.background = c.color;
  document.getElementById('modal-title-zh').innerText = c.flag + " " + c.name;
  document.getElementById('modal-title-en').innerText = c.en;
  const container = document.getElementById('student-container');
  container.innerHTML = '';
  c.students.forEach(s => {
    const card = document.createElement('div');
    card.className = 'student-card';
    const badgeColor = s.s.startsWith('112') ? '#FDEBD0' : s.s.startsWith('113') ? '#EDE0FF' : '#D5F5E3';
    const textColor = s.s.startsWith('112') ? '#B7770D' : s.s.startsWith('113') ? '#5B2C8D' : '#1A7A3F';
    card.innerHTML = `<div class="st-top"><div class="st-name">${s.n}</div><div class="st-year" style="background:${badgeColor}; color:${textColor}">${s.s}</div></div><div class="st-sch">${s.sch}</div>`;
    container.appendChild(card);
  });
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

// ── 初始化 ──
window.onload = () => {
  const listEl = document.getElementById('country-list');
  countries.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'country-btn';
    btn.onclick = () => openModal(c);
    btn.innerHTML = `<div class="country-info"><div class="country-flag">${c.flag}</div><div><div class="country-name-zh">${c.name}</div><div class="country-name-en">${c.en}</div></div></div><div class="country-count">${c.students.length}</div>`;
    listEl.appendChild(btn);
  });
  
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
    const allFeats = topojson.feature(world, world.objects.countries);
    const filteredFeats = allFeats.features.filter(d => d.id !== '010');
    
    // 手機首頁地圖 (自動縮放比例)
    const heroSvg = d3.select('#hero-map-svg');
    const heroRect = document.getElementById('hero-map-svg').getBoundingClientRect();
    const heroProj = d3.geoNaturalEarth1().scale(heroRect.width/6.5).translate([heroRect.width/2, heroRect.height/2]);
    heroSvg.append('g').selectAll('path').data(filteredFeats).join('path').attr('d', d3.geoPath(heroProj)).attr('fill', '#EEE').attr('stroke', '#FFF');
    countries.forEach(c => {
      const [dx, dy] = heroProj(c.center);
      heroSvg.append('circle').attr('cx', dx).attr('cy', dy).attr('r', 4).attr('fill', '#6C5CE7');
    });

    // 名單頁地圖
    const listSvg = d3.select('#list-map-svg');
    const listRect = document.getElementById('list-map-svg').getBoundingClientRect();
    const listProj = d3.geoNaturalEarth1().scale(listRect.width/7).translate([listRect.width/2, listRect.height/1.8]);
    listSvg.append('g').selectAll('path').data(filteredFeats).join('path').attr('d', d3.geoPath(listProj)).attr('fill', '#EEE').attr('stroke', '#FFF');
  });
};
</script>
</body>
</html>
